name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: aarch64-apple-darwin
            build: exon
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
            build: exon
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
            build: exon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Install exon
        if: matrix.build == 'exon'
        run: |
          gh release download v0.7.1 -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build with exon
        if: matrix.build == 'exon'
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            export PATH="$(brew --prefix llvm)/bin:$PATH"
          else
            export PATH="/usr/lib/llvm-20/bin:$PATH"
          fi
          exon build
          exon test

      - name: Verify
        run: .exon/debug/intron help
