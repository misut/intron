name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".claude/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron (macOS)
        if: runner.os == 'macOS'
        run: |
          # Bootstrap from the version pinned in mise.toml so CI understands
          # the current portable .intron.toml layout.
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p 'intron-*-aarch64-apple-darwin.tar.gz'
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains (macOS)
        if: runner.os == 'macOS'
        run: |
          intron install

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz
          if [ "$RUNNER_OS" = "macOS" ]; then
            mv exon ./.exon-ci
            chmod +x ./.exon-ci
          else
            sudo mv exon /usr/local/bin/
          fi
          rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare clean macOS exon home
        if: runner.os == 'macOS'
        shell: bash
        run: |
          EXON_CI_HOME="$RUNNER_TEMP/exon-ci-home"
          mkdir -p "$EXON_CI_HOME/.intron"
          ln -sfn "$HOME/.intron/toolchains" "$EXON_CI_HOME/.intron/toolchains"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          EXON_CI_HOME="$RUNNER_TEMP/exon-ci-home"
          # Keep the macOS runner environment narrow so the portable config
          # resolves toolchains from the expected intron home.
          env -i \
            HOME="$EXON_CI_HOME" \
            PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" \
            TMPDIR="${TMPDIR:-/tmp}" \
            CI="${CI:-true}" \
            GITHUB_ACTIONS="${GITHUB_ACTIONS:-true}" \
            RUNNER_OS="$RUNNER_OS" \
            RUNNER_ARCH="$RUNNER_ARCH" \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            ImageOS="${ImageOS:-}" \
            ImageVersion="${ImageVersion:-}" \
            ./.exon-ci build

      - name: Test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          EXON_CI_HOME="$RUNNER_TEMP/exon-ci-home"
          env -i \
            HOME="$EXON_CI_HOME" \
            PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin" \
            TMPDIR="${TMPDIR:-/tmp}" \
            CI="${CI:-true}" \
            GITHUB_ACTIONS="${GITHUB_ACTIONS:-true}" \
            RUNNER_OS="$RUNNER_OS" \
            RUNNER_ARCH="$RUNNER_ARCH" \
            GITHUB_WORKSPACE="$GITHUB_WORKSPACE" \
            ImageOS="${ImageOS:-}" \
            ImageVersion="${ImageVersion:-}" \
            ./.exon-ci test

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          export PATH="/usr/lib/llvm-20/bin:$PATH"
          exon build
          exon test

      - name: Verify
        shell: bash
        run: |
          binary=""
          for candidate in \
            ./.exon/debug/intron \
            ./.exon/release/intron \
            ./build/intron \
            ./.exon/debug/intron.exe \
            ./.exon/release/intron.exe \
            ./build/intron.exe
          do
            if [ -f "$candidate" ]; then
              binary="$candidate"
              break
            fi
          done
          test -n "$binary"
          "$binary" help

  bootstrap-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Checkout tomlcpp
        uses: actions/checkout@v6
        with:
          repository: misut/tomlcpp
          ref: v0.3.0
          path: tomlcpp

      - name: Checkout cppx
        uses: actions/checkout@v6
        with:
          repository: misut/cppx
          ref: v1.4.0
          path: cppx

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.3.1'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure
        run: >
          cmake -G Ninja -S .github/cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTOMLCPP_DIR=${{ github.workspace }}/tomlcpp
          -DCPPX_DIR=${{ github.workspace }}/cppx

      - name: Build
        run: cmake --build build

      - name: Verify
        run: .\build\intron.exe help

      - name: Verify MSVC provisioning
        shell: pwsh
        run: |
          .\build\intron.exe install msvc 2022
          .\build\intron.exe default msvc 2022

          $whichOutput = & .\build\intron.exe which cl.exe
          $whichOutput | Out-Host
          if (-not ($whichOutput | Select-String -SimpleMatch 'cl.exe')) {
            throw "missing expected cl.exe path"
          }

      - name: Verify Windows env output
        shell: pwsh
        run: |
          foreach ($name in @('INCLUDE', 'LIB', 'LIBPATH')) {
            Remove-Item "Env:$name" -ErrorAction SilentlyContinue
          }

          $expectedCl = (& .\build\intron.exe which cl.exe | Select-Object -First 1).Trim()
          if (-not $expectedCl) {
            throw 'missing expected cl.exe path from intron which'
          }

          $envOutput = & .\build\intron.exe env
          $envOutput | Out-Host

          foreach ($needle in @('$env:PATH =', '$env:CC =', '$env:CXX =', '$env:INCLUDE =', '$env:LIB =', '$env:LIBPATH =', 'Hostx64\x64')) {
            if (-not ($envOutput | Select-String -SimpleMatch $needle)) {
              throw "missing expected intron env output: $needle"
            }
          }

          $execOutput = & .\build\intron.exe exec -- where.exe cl.exe
          $execOutput | Out-Host

          $resolvedCl = ($execOutput | Where-Object { $_ } | Select-Object -First 1).Trim()
          if (-not $resolvedCl) {
            throw 'missing expected intron exec output for cl.exe'
          }
          if ($resolvedCl -ne $expectedCl) {
            throw "intron exec resolved unexpected cl.exe path: $resolvedCl"
          }
