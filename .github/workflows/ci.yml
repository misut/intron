name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: aarch64-apple-darwin
            build: exon
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
            build: cmake
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
            build: cmake
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Build with exon
        if: matrix.build == 'exon'
        run: |
          gh release download v0.2.0 -R misut/exon -p 'exon-*-aarch64-apple-darwin.tar.gz'
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
          export PATH="$(brew --prefix llvm)/bin:$PATH"
          exon build
          exon test
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build with cmake
        if: matrix.build == 'cmake'
        run: |
          git clone https://github.com/misut/tomlcpp.git /tmp/tomlcpp
          if [ "$RUNNER_OS" = "macOS" ]; then
            LLVM_PREFIX=$(brew --prefix llvm)
            CXX="$LLVM_PREFIX/bin/clang++"
            MODULES_JSON="$LLVM_PREFIX/lib/c++/libc++.modules.json"
            LINKER_FLAGS="-L$LLVM_PREFIX/lib/c++ -lc++ -L$LLVM_PREFIX/lib/unwind -lunwind"
          else
            CXX=clang++-20
            MODULES_JSON=/usr/lib/llvm-20/lib/libc++.modules.json
            CXX_FLAGS="-stdlib=libc++"
            LINKER_FLAGS="-stdlib=libc++ -lc++abi"
          fi
          cmake -B build -S .github/cmake -G Ninja \
            -DTOMLCPP_DIR=/tmp/tomlcpp \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON="$MODULES_JSON" \
            -DCMAKE_CXX_FLAGS="${CXX_FLAGS:-}" \
            -DCMAKE_EXE_LINKER_FLAGS="$LINKER_FLAGS"
          cmake --build build
          mkdir -p .exon/debug && cp build/intron .exon/debug/intron

      - name: Verify
        run: .exon/debug/intron help
