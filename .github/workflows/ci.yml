name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - "mise.toml"
      - ".claude/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - "mise.toml"
      - ".claude/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron (macOS)
        if: runner.os == 'macOS'
        run: |
          # Pin to a known-good version, not latest, to avoid chicken-and-egg
          # if the most recent release is broken (e.g. has zero assets).
          gh release download v0.15.0 -R misut/intron -p 'intron-*-aarch64-apple-darwin.tar.gz'
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains (macOS)
        if: runner.os == 'macOS'
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron default llvm 22.1.2
          intron default cmake 4.3.1
          intron default ninja 1.13.2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Install exon
        run: |
          gh release download v0.17.0 -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build and test
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            eval "$(intron env)"
          else
            export PATH="/usr/lib/llvm-20/bin:$PATH"
          fi
          exon build
          exon test

      - name: Verify
        run: .exon/debug/intron help

  bootstrap-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Checkout tomlcpp
        uses: actions/checkout@v6
        with:
          repository: misut/tomlcpp
          ref: v0.3.0
          path: tomlcpp

      - name: Checkout cppx
        uses: actions/checkout@v6
        with:
          repository: misut/cppx
          ref: v0.3.1
          path: cppx

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.3.1'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure
        run: >
          cmake -G Ninja -S .github/cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTOMLCPP_DIR=${{ github.workspace }}/tomlcpp
          -DCPPX_DIR=${{ github.workspace }}/cppx

      - name: Build
        run: cmake --build build

      - name: Verify
        run: .\build\intron.exe help
