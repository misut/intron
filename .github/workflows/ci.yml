name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron
        run: |
          # Bootstrap from the version pinned in mise.toml so CI understands
          # the current portable .intron.toml layout.
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz
          if [ "$RUNNER_OS" = "macOS" ]; then
            mv exon ./.exon-ci
            chmod +x ./.exon-ci
          else
            sudo mv exon /usr/local/bin/
          fi
          rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify portable toolchain resolution
        shell: bash
        run: |
          for tool in clang cmake ninja; do
            resolved="$(intron which "$tool")"
            echo "$resolved"
            test -n "$resolved"
            case "$resolved" in
              "$HOME/.intron/toolchains/"*) ;;
              *)
                echo "expected $tool under ~/.intron/toolchains, got: $resolved" >&2
                exit 1
                ;;
            esac
          done

      - name: Build and test (macOS)
        if: runner.os == 'macOS'
        run: |
          eval "$(intron env)"
          ./.exon-ci build
          ./.exon-ci test

      - name: Build and test (Linux)
        if: runner.os == 'Linux'
        run: |
          eval "$(intron env)"
          exon build
          exon test

      - name: Verify
        if: runner.os == 'Linux'
        shell: bash
        run: |
          binary=""
          for candidate in \
            ./.exon/debug/intron \
            ./.exon/release/intron \
            ./build/intron \
            ./.exon/debug/intron.exe \
            ./.exon/release/intron.exe \
            ./build/intron.exe
          do
            if [ -f "$candidate" ]; then
              binary="$candidate"
              break
            fi
          done
          test -n "$binary"
          "$binary" help

  bootstrap-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Checkout tomlcpp
        uses: actions/checkout@v6
        with:
          repository: misut/tomlcpp
          ref: v0.3.0
          path: tomlcpp

      - name: Checkout cppx
        uses: actions/checkout@v6
        with:
          repository: misut/cppx
          ref: v1.8.0
          path: cppx

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.3.1'

      - name: Install Ninja
        run: choco install ninja

      - name: Configure
        shell: cmd
        run: |
          set "VSINSTALL="
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL exit /b 1
          if not exist "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" exit /b 1
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake -G Ninja -S .github/cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DTOMLCPP_DIR=${{ github.workspace }}/tomlcpp ^
            -DCPPX_DIR=${{ github.workspace }}/cppx

      - name: Build
        shell: cmd
        run: |
          set "VSINSTALL="
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL exit /b 1
          if not exist "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" exit /b 1
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake --build build

      - name: Configure unit tests
        shell: cmd
        run: |
          set "VSINSTALL="
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL exit /b 1
          if not exist "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" exit /b 1
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake -G Ninja -S . -B test-build

      - name: Build unit tests
        shell: cmd
        run: |
          set "VSINSTALL="
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%I"
          if not defined VSINSTALL exit /b 1
          if not exist "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" exit /b 1
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          cmake --build test-build ^
            --target test-test_app test-test_config test-test_installer test-test_registry

      - name: Run unit tests
        shell: pwsh
        run: |
          foreach ($test in @(
            'test-test_app.exe',
            'test-test_config.exe',
            'test-test_installer.exe',
            'test-test_registry.exe'
          )) {
            $path = Join-Path $PWD "test-build\\$test"
            if (-not (Test-Path $path)) {
              throw "missing expected test binary: $path"
            }
            & $path
          }

      - name: Verify
        run: .\build\intron.exe help

      - name: Verify MSVC provisioning
        shell: pwsh
        run: |
          .\build\intron.exe install msvc 2022
          .\build\intron.exe default msvc 2022

          $whichOutput = & .\build\intron.exe which cl.exe
          $whichOutput | Out-Host
          if (-not ($whichOutput | Select-String -SimpleMatch 'cl.exe')) {
            throw "missing expected cl.exe path"
          }

      - name: Verify Windows env output
        shell: pwsh
        run: |
          foreach ($name in @('INCLUDE', 'LIB', 'LIBPATH')) {
            Remove-Item "Env:$name" -ErrorAction SilentlyContinue
          }

          $expectedCl = (& .\build\intron.exe which cl.exe | Select-Object -First 1).Trim()
          if (-not $expectedCl) {
            throw 'missing expected cl.exe path from intron which'
          }

          $envOutput = & .\build\intron.exe env
          $envOutput | Out-Host

          foreach ($needle in @('$env:PATH =', '$env:CC =', '$env:CXX =', '$env:INCLUDE =', '$env:LIB =', '$env:LIBPATH =', 'Hostx64\x64')) {
            if (-not ($envOutput | Select-String -SimpleMatch $needle)) {
              throw "missing expected intron env output: $needle"
            }
          }

          $execOutput = & .\build\intron.exe exec -- where.exe cl.exe
          $execOutput | Out-Host

          $resolvedCl = ($execOutput | Where-Object { $_ } | Select-Object -First 1).Trim()
          if (-not $resolvedCl) {
            throw 'missing expected intron exec output for cl.exe'
          }
          if ($resolvedCl -ne $expectedCl) {
            throw "intron exec resolved unexpected cl.exe path: $resolvedCl"
          }
