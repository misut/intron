name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install llvm ninja

      - name: Install exon
        run: |
          gh release download v0.0.0 -R misut/exon -p 'exon-*-aarch64-apple-darwin.tar.gz'
          tar xzf exon-*.tar.gz
          sudo mv exon /usr/local/bin/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          export PATH="$(brew --prefix llvm)/bin:$PATH"
          exon build --release

      - name: Package
        run: |
          tar -czf intron-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz \
            -C .exon/release intron

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: intron-*.tar.gz
          generate_release_notes: true
