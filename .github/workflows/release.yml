name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install intron (macOS)
        if: runner.os == 'macOS'
        run: |
          gh release download -R misut/intron -p 'intron-*-aarch64-apple-darwin.tar.gz'
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains (macOS)
        if: runner.os == 'macOS'
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron default llvm 22.1.2
          intron default cmake 4.3.1
          intron default ninja 1.13.2

      - name: Bootstrap exon (macOS)
        if: runner.os == 'macOS'
        run: |
          eval "$(intron env)"
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          MODULES_JSON=$(find "$LLVM_ROOT" -name "libc++.modules.json" -print -quit)
          SYSROOT=$(xcrun --show-sdk-path)
          git clone --depth 1 --branch v0.7.1 https://github.com/misut/exon.git /tmp/exon
          git clone https://github.com/misut/tomlcpp.git /tmp/tomlcpp
          CMAKE_ARGS="-Wno-dev -B /tmp/exon-build -S /tmp/exon/.github/cmake -G Ninja"
          CMAKE_ARGS="$CMAKE_ARGS -DTOMLCPP_DIR=/tmp/tomlcpp"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_COMPILER=$LLVM_ROOT/bin/clang++"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_SYSROOT=$SYSROOT"
          if [ -n "$MODULES_JSON" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STDLIB_MODULES_JSON=$MODULES_JSON"
          fi
          eval cmake $CMAKE_ARGS
          cmake --build /tmp/exon-build
          sudo cp /tmp/exon-build/exon /usr/local/bin/

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Install exon (Linux)
        if: runner.os == 'Linux'
        run: |
          gh release download v0.7.1 -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            eval "$(intron env)"
          else
            export PATH="/usr/lib/llvm-20/bin:$PATH"
          fi
          exon build --release

      - name: Package
        run: |
          tar -czf intron-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz \
            -C .exon/release intron

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: intron-${{ matrix.platform }}
          path: intron-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: intron-*.tar.gz
          generate_release_notes: true
