name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Install intron (macOS)
        if: runner.os == 'macOS'
        run: |
          # Pin to a known-good version (not latest) for the chicken-and-egg
          # bootstrap — same reason as ci.yml.
          gh release download v0.17.0 -R misut/intron -p 'intron-*-aarch64-apple-darwin.tar.gz'
          tar xzf intron-*.tar.gz && sudo mv intron /usr/local/bin/ && rm intron-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains (macOS)
        if: runner.os == 'macOS'
        run: |
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron install llvm 22.1.2
          intron default llvm 22.1.2
          intron default cmake 4.3.1
          intron default ninja 1.13.2

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Install exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && sudo mv exon /usr/local/bin/ && rm exon-*.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            eval "$(intron env)"
          else
            export PATH="/usr/lib/llvm-20/bin:$PATH"
          fi
          exon build --release

      - name: Package
        run: |
          tar -czf intron-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz \
            -C .exon/release intron

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: intron-${{ matrix.platform }}
          path: intron-*.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Checkout tomlcpp
        uses: actions/checkout@v6
        with:
          repository: misut/tomlcpp
          ref: v0.3.0
          path: tomlcpp

      - name: Checkout cppx
        uses: actions/checkout@v6
        with:
          repository: misut/cppx
          ref: v1.4.0
          path: cppx

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.3.1'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure
        run: >
          cmake -G Ninja -S .github/cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTOMLCPP_DIR=${{ github.workspace }}/tomlcpp
          -DCPPX_DIR=${{ github.workspace }}/cppx

      - name: Build
        run: cmake --build build

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/intron.exe -DestinationPath intron-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: intron-x86_64-pc-windows-msvc
          path: intron-*.zip

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            intron-*.tar.gz
            intron-*.zip
          generate_release_notes: true

  self-bump:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.BUMP_BOT_TOKEN }}

      - name: Create and auto-merge self bump PR
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/\1/p' mise.toml)
          test -n "$CURRENT"
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "mise.toml already points to intron ${VERSION}"
            exit 0
          fi

          sed -i "s|\"vfox:misut/mise-intron\" = \"${CURRENT}\"|\"vfox:misut/mise-intron\" = \"${VERSION}\"|" mise.toml

          BRANCH="chore/bump-intron-v${VERSION}"
          git checkout -b "$BRANCH"
          git add mise.toml
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --author "misut <pkr5207@gmail.com>" -m "chore: bump intron to v${VERSION}"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push --force origin "HEAD:$BRANCH"
          else
            git push origin "$BRANCH"
          fi

          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "chore: bump intron to v${VERSION}" \
              --body "Automated bump triggered by [intron v${VERSION}](https://github.com/misut/intron/releases/tag/v${VERSION})." \
              --base main \
              --head "$BRANCH")
          fi

          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.BUMP_BOT_TOKEN }}

  notify:
    needs: [release]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [exon, txn, cppx, phenotype, jsoncpp, tomlcpp]
    steps:
      - name: Dispatch bump to ${{ matrix.repo }}
        run: |
          gh api repos/misut/${{ matrix.repo }}/dispatches \
            -f event_type=bump-tool \
            -f 'client_payload[tool]=intron' \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
